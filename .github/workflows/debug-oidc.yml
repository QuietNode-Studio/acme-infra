name: debug-oidc
# Temporary diagnostic: prints iss/aud/sub of the runner's OIDC token.
# Removed once the trust policy is confirmed.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  claims:
    runs-on: ubuntu-latest
    steps:
      - name: Print OIDC claims (no signature material)
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{iss, aud, sub, repository, ref, event_name}'
